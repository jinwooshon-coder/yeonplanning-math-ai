<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결제 처리 중 — 연플래닝 수학AI</title>
  <style>
    body { margin:0; background:#0a1628; color:#e8f0fe; font-family:'Apple SD Gothic Neo',sans-serif;
           display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
    .icon { font-size:56px; margin-bottom:16px; }
    h2 { font-size:22px; margin-bottom:8px; }
    p  { color:#8ba3c0; font-size:14px; }
    .spinner { width:40px; height:40px; border:3px solid #1e3a5f; border-top-color:#1D9E75;
               border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 20px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div>
    <div id="view-loading">
      <div class="spinner"></div>
      <h2>결제를 확인하고 있어요...</h2>
      <p>잠시만 기다려 주세요</p>
    </div>
    <div id="view-success" style="display:none">
      <div class="icon">🎉</div>
      <h2>결제 완료!</h2>
      <p>연플래닝 수학AI 회원이 되셨어요.<br>잠시 후 앱으로 이동합니다.</p>
    </div>
    <div id="view-fail" style="display:none">
      <div class="icon">😢</div>
      <h2>결제에 실패했어요</h2>
      <p id="fail-msg"></p>
      <br><a href="/" style="color:#1D9E75">← 돌아가기</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const paymentKey = params.get('paymentKey');
    const orderId    = params.get('orderId');
    const amount     = params.get('amount');
    const plan       = params.get('plan');

    // 실패 페이지
    if (location.pathname.includes('payment-fail')) {
      document.getElementById('view-loading').style.display = 'none';
      document.getElementById('view-fail').style.display = 'block';
      document.getElementById('fail-msg').textContent =
        params.get('message') || '결제가 취소되었거나 오류가 발생했어요.';
    }
    // 성공 페이지
    else if (paymentKey && orderId && amount) {
      fetch('/api/payment-confirm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ paymentKey, orderId, amount }),
      })
      .then(r => r.json())
      .then(data => {
        document.getElementById('view-loading').style.display = 'none';
        if (data.ok) {
          // 결제 성공 상태 저장
          localStorage.setItem('yp_paid', '1');
          localStorage.setItem('yp_plan', plan || 'basic');
          localStorage.setItem('yp_daily_limit', plan === 'premium' ? '30' : '10');
          document.getElementById('view-success').style.display = 'block';
          setTimeout(() => { location.href = '/'; }, 2000);
        } else {
          document.getElementById('view-fail').style.display = 'block';
          document.getElementById('fail-msg').textContent = data.message || '결제 확인 실패';
        }
      })
      .catch(() => {
        document.getElementById('view-loading').style.display = 'none';
        document.getElementById('view-fail').style.display = 'block';
        document.getElementById('fail-msg').textContent = '네트워크 오류가 발생했어요.';
      });
    }
  </script>
</body>
</html>
