<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1D9E75">
  <meta name="description" content="연플래닝 수학AI - Claude Opus 기반 수학 문제 풀이">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>연플래닝 수학AI</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/style.css">
  <!-- KaTeX for math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
</head>
<body>

  <!-- 로그인 화면 -->
  <div id="login-screen" class="screen active">
    <div class="login-container">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 48 48" width="64" height="64">
            <circle cx="24" cy="24" r="22" fill="#1D9E75" opacity="0.15"/>
            <text x="24" y="32" text-anchor="middle" fill="#1D9E75" font-size="24" font-weight="bold">f</text>
          </svg>
        </div>
        <h1>연플래닝 수학AI</h1>
        <p class="subtitle">Claude Opus 기반 수학 튜터</p>
      </div>

      <form id="login-form" autocomplete="off">
        <div class="input-group">
          <label for="student-id">이름</label>
          <input type="text" id="student-id" placeholder="이름을 입력하세요" required>
        </div>
        <div class="input-group">
          <label for="password">학생 코드</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="학생 코드를 입력하세요" required>
            <button type="button" id="toggle-password" class="btn-toggle-pw" aria-label="코드 보기/숨기기">
              <svg class="eye-open" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-closed hidden" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" id="login-btn" class="btn-primary">
          <span class="btn-text">로그인</span>
          <span class="btn-loading hidden">인증 중...</span>
        </button>
        <p id="login-error" class="error-msg hidden"></p>
      </form>
    </div>
  </div>

  <!-- 메인 풀이 화면 -->
  <div id="main-screen" class="screen">
    <!-- 상단 헤더 -->
    <header class="app-header">
      <div class="header-left">
        <h2>수학AI</h2>
      </div>
      <div class="header-right">
        <span id="user-info" class="user-badge"></span>
        <span id="remaining-badge" class="remaining-badge"></span>
        <button id="logout-btn" class="btn-icon" title="로그아웃">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- 풀이 영역 -->
    <main class="solve-area">
      <!-- 풀이 결과 표시 -->
      <div id="answer-container" class="answer-container hidden">
        <div class="answer-header">
          <h3>풀이 결과</h3>
          <button id="copy-btn" class="btn-small" title="복사">복사</button>
        </div>
        <div id="answer-content" class="answer-content"></div>
        <div id="save-status" class="save-status hidden"></div>
      </div>

      <!-- 빈 상태 -->
      <div id="empty-state" class="empty-state">
        <svg viewBox="0 0 48 48" width="48" height="48" opacity="0.3">
          <circle cx="24" cy="24" r="22" fill="none" stroke="#1D9E75" stroke-width="2"/>
          <text x="24" y="30" text-anchor="middle" fill="#1D9E75" font-size="20">?</text>
        </svg>
        <p>수학 문제를 입력하거나<br>사진을 촬영해보세요</p>
        <p class="upload-hint">이미지: 드래그 / 붙여넣기(Ctrl+V) / 클릭 첨부</p>
      </div>
    </main>

    <!-- 하단 입력 영역 -->
    <footer class="input-area">
      <!-- 이미지 미리보기 -->
      <div id="image-preview" class="image-preview hidden">
        <img id="preview-img" src="" alt="첨부 이미지">
        <button id="remove-image" class="btn-remove-img">&times;</button>
      </div>

      <div class="input-row">
        <label class="btn-icon attach-btn" title="갤러리에서 선택">
          <input type="file" id="image-input" accept="image/*" hidden>
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </label>
        <label class="btn-icon camera-btn" title="카메라로 촬영">
          <input type="file" id="camera-input" accept="image/*" capture="environment" hidden>
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </label>
        <textarea id="question-input" placeholder="수학 문제를 입력하세요..." rows="1"></textarea>
        <button id="solve-btn" class="btn-send" disabled title="풀이 요청">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </footer>
  </div>

  <!-- 로딩 오버레이 -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="loading-spinner"></div>
    <p>AI가 풀이 중입니다...</p>
  </div>

  <script src="/app.js"></script>
</body>
</html>
