[build]
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[functions.solve]
  timeout = 60


[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# 결제 성공/실패 → payment-success.html (내부에서 분기 처리)
[[redirects]]
  from = "/payment-success"
  to = "/payment-success.html"
  status = 200

[[redirects]]
  from = "/payment-fail"
  to = "/payment-success.html"
  status = 200