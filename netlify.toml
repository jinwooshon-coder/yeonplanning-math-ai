[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions.solve]
  timeout = 60

[functions.payment-confirm]
  timeout = 15

[functions.signup]
  timeout = 15

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# 결제 성공/실패 → payment-success.html (내부에서 분기 처리)
[[redirects]]
  from = "/payment-success"
  to = "/payment-success.html"
  status = 200

[[redirects]]
  from = "/payment-fail"
  to = "/payment-success.html"
  status = 200